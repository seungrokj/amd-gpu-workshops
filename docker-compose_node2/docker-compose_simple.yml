x-vllm-env: &vllm-env
  HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
  MODEL_NAME: ${MODEL_NAME:-Qwen/Qwen3-30B-A3B}
  SERVED_MODEL_NAME: ${SERVED_MODEL_NAME:-Qwen3-30B-A3B}
  VLLM_API_KEY: ${VLLM_API_KEY:-abc-123}
  VLLM_USE_TRITON_FLASH_ATTN: ${VLLM_USE_TRITON_FLASH_ATTN:-0}

x-vllm-common: &vllm-common
  image: vllm/vllm-openai-rocm:v0.19.0
  restart: unless-stopped
  ipc: host
  shm_size: 16gb
  group_add:
    - video
  cap_add:
    - SYS_PTRACE
  security_opt:
    - seccomp=unconfined
  devices:
    - /dev/kfd
    - /dev/dri
  environment: *vllm-env
  volumes:
    - hf-cache:/root/.cache/huggingface
  command:
    - /bin/bash
    - -lc
    - >
      vllm serve "$${MODEL_NAME}"
      --host 0.0.0.0
      --port "$${PORT}"
      --served-model-name "$${SERVED_MODEL_NAME}"
      --api-key "$${VLLM_API_KEY}"
      --enable-auto-tool-choice
      --tool-call-parser hermes
      --trust-remote-code

services:
  vllm-8000:
    <<: *vllm-common
    container_name: vllm-8000
    environment:
      <<: *vllm-env
      PORT: "8000"
    ports:
      - "8000:8000"

  vllm-8001:
    <<: *vllm-common
    container_name: vllm-8001
